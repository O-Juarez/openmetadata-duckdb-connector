# Template for the custom DuckDB profiler. Copy to duckdb_profiler.yml and edit.
#
# This is NOT the OM `metadata profile` workflow — it's a separate CLI shipped
# with this project (`duckdb-profile`) that bridges DuckDB → OM SDK, since OM
# 1.12.x has no native DuckDB connector. Tables already in OM under the named
# service are profiled and the results uploaded via the OM REST API.
#
# Run:
#   set -a && . .env && set +a
#   duckdb-profile -c duckdb_profiler.yml

source:
  type: customDatabase
  serviceName: duckdb_remote
  serviceConnection:
    config:
      type: CustomDatabase
      databaseName: my_md_database
      databaseUrl: "md:my_md_database"          # or "/path/to/file.duckdb" for local
      motherduckToken: "${MOTHERDUCK_TOKEN}"    # optional — falls back to env var
  sourceConfig:
    config:
      type: Profiler
      profileSample: 10             # percent of rows to sample (1-100)
      schemaFilterPattern:
        includes:
          - main
          - analytics
      # tableFilterPattern:
      #   includes: ["dim_.*", "fact_.*"]
      #   excludes: [".*_staging"]

workflowConfig:
  openMetadataServerConfig:
    hostPort: http://localhost:8585/api
    securityConfig:
      jwtToken: "${OM_JWT}"
