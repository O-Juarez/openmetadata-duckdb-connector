# Template — native OpenMetadata DuckDB connector (NOT the customDatabase one).
# Use this when you want profiling and SQL-based lineage support.
#
# Copy to duckdb_metadata.yml and edit. Service swap caveat: if a service with
# the same `serviceName` already exists with type customDatabase, delete it in
# the OM UI first or pick a new serviceName here.
#
# Run:
#   set -a && . .env && set +a
#   metadata ingest -c duckdb_metadata.yml

source:
  type: duckdb
  serviceName: duckdb_remote
  serviceConnection:
    config:
      type: Duckdb
      databaseName: my_md_database
      databaseUrl: "md:my_md_database?motherduck_token=${MOTHERDUCK_TOKEN}"
  sourceConfig:
    config:
      type: DatabaseMetadata
      schemaFilterPattern:
        includes:
          - main
          - analytics

sink:
  type: metadata-rest
  config: {}

workflowConfig:
  loggerLevel: INFO
  openMetadataServerConfig:
    hostPort: http://localhost:8585/api
    authProvider: openmetadata
    securityConfig:
      jwtToken: "${OM_JWT}"
